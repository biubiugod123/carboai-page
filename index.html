<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CarboAI - Your Smart Carb Cycling Companion. AI-powered nutrition tracking and personalized carb cycling plans.">
  <title>CarboAI - Smart Carb Cycling Companion</title>
  
  <style>
    /* === Design System === */
    :root {
      /* Colors */
      --primary-50: #FFFCF5;
      --primary-100: #FFF8E7;
      --primary-200: #FFE8C5;
      --accent: #F59E0B;
      
      --gray-900: #2C2C2C;
      --gray-700: #4A4A4A;
      --gray-500: #666666;
      --gray-300: #9CA3AF;
      --gray-100: #F9FAFB;
      
      --cta-bg: #000000;
      --cta-text: #FFFFFF;
      
      /* Spacing */
      --space-xs: 8px;
      --space-sm: 16px;
      --space-md: 24px;
      --space-lg: 40px;
      --space-xl: 64px;
      --space-2xl: 80px;
      
      /* Typography */
      --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    /* === Global Styles === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html {
      scroll-behavior: smooth;
    }
    
    body {
      font-family: var(--font-family);
      font-size: 16px;
      line-height: 1.6;
      color: var(--gray-700);
    }
    
    /* === Typography === */
    h1 {
      font-size: 48px;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.2;
    }
    
    h2 {
      font-size: 32px;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.3;
    }
    
    h3 {
      font-size: 24px;
      font-weight: 600;
      color: var(--gray-900);
      line-height: 1.4;
    }
    
    /* === Responsive Typography === */
    @media (max-width: 768px) {
      h1 { font-size: 36px; }
      h2 { font-size: 28px; }
      h3 { font-size: 20px; }
    }
  </style>
</head>

</body>
</html>
